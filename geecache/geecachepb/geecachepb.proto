syntax = "proto3";

package geecachepb;

option go_package = "./";

message Request {
    string group = 1;
    string key = 2;
    // 新增：用于更新操作的值
    bytes value = 3;
}

message Response {
    bytes value = 1;
}

service GroupCache {
    rpc Get(Request) returns (Response);
    // 缓存失效接口
    rpc Invalidate(Request) returns (Response);
    // 更新接口
    rpc Update(Request) returns (Response);
}